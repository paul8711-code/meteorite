[package]
name = "meteorite"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
dirs = "6.0.0"
keyring = { version = "3.6.3", features = ["linux-native", "windows-native", "apple-native"] }
matrix-sdk = { version = "0.16.0", features = ["sqlite", "native-tls", "e2e-encryption", "automatic-room-key-forwarding", "qrcode"] }
random-string = "1.1.0"
rpassword = "7.4.0"
serde_json = "1.0.149"
tokio = { version = "1.50.0", features = ["full"] }
